<style>

/* 🌿 DESIGN */
:root {
  --bg: #faf8f3;
  --text: #2a2a2a;
  --green: #7a8f7a;
}

/* BASE */
body {
  margin: 0;
  font-family: 'Inter', sans-serif;
  background: var(--bg);
  color: var(--text);
}

/* NAV */
.navbar{
  position: fixed;
  top: 0;
  width: 100%;
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 18px;
  background: rgba(250,248,243,0.95);
  z-index: 100;
}

.nav-left {
  display: flex;
  gap: 30px;
}

.nav-right {
  position: absolute;
  right: 30px;
}

.navbar a {
  text-decoration: none;
  color: var(--text);
  cursor: pointer;
  transition: 0.2s ease;
}

/* HOVER EFFECT */
.navbar a:hover,
.dropbtn:hover {
  color: rgba(42, 42, 42, 0.55);
}

/* DROPBTN */
.dropbtn {
  background: none;
  border: none;
  font: inherit;
  color: var(--text);
  cursor: pointer;
  padding: 0;
  transition: 0.2s ease;
}

/* DROPDOWN */
.dropdown { 
  position: relative;
}

.dropdown-content {
  display: block;
  opacity: 0;
  visibility: hidden;
  transform: translateY(10px);
  transition: 0.25s ease;
  position: absolute;
  top: 25px;
  background: white;
  border-radius: 8px;
  min-width: 180px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.08);
  pointer-events: none;
}

/* OPEN STATE (CLICK) */
.dropdown.open .dropdown-content {
  opacity: 1;
  visibility: visible;
  transform: translateY(0);
  pointer-events: auto;
}

.dropdown-content a {
  display: block;
  padding: 12px 14px;
  text-decoration: none;
  color: var(--text);
}

.dropdown-content a:hover {
  background: rgba(122,143,122,0.08);
}

/* PAGE */
.page {
  display: none;
  padding-top: 100px;
}

.page.active {
  display: block;
}

/* HERO */
.hero {
  padding: 160px 40px;
  position: relative;
  overflow: hidden;
}

.hero h1 {
  font-family: 'Playfair Display';
  font-size: 5em;
  margin: 0;
}

.ev {
  font-family: 'Playfair Display';
  font-size: 42px;
  color: var(--green);
}

/* 🌿 PREMIUM FERN HERO */
.hero::before {
  content: "";
  position: absolute;
  right: -90px;
  top: -30px;
  width: 620px;
  height: 620px;
  background: url("images/fern-bg.png") no-repeat center/contain;
  opacity: 0.16;
  filter: sepia(1) hue-rotate(68deg) saturate(0.7) brightness(0.95);
  transform: rotate(10deg);
  animation: fernFloat 12s ease-in-out infinite;
  z-index: -2;
  pointer-events: none;
}

.hero::after {
  content: "";
  position: absolute;
  right: 30px;
  top: 70px;
  width: 470px;
  height: 470px;
  background: url("images/fern-bg.png") no-repeat center/contain;
  opacity: 0.06;
  filter: blur(2px);
  transform: rotate(-8deg);
  z-index: -3;
  pointer-events: none;
}

/* CONTENT */
.section {
  max-width: 900px;
  padding: 100px 40px;
  line-height: 1.8;
  position: relative;
  overflow: hidden;
}

/* 🌿 PREMIUM FERN SECTION */
.section::after {
  content: "";
  position: absolute;
  right: -60px;
  top: 24%;
  width: 430px;
  height: 430px;
  background: url("images/fern-bg.png") no-repeat center/contain;
  opacity: 0.08;
  filter: sepia(1) hue-rotate(70deg) saturate(0.55) brightness(0.96);
  transform: rotate(-10deg);
  animation: fernFloatSlow 16s ease-in-out infinite;
  z-index: -1;
  pointer-events: none;
}

.section::before {
  content: "";
  position: absolute;
  left: -120px;
  bottom: 0;
  width: 280px;
  height: 280px;
  background: url("images/fern-bg.png") no-repeat center/contain;
  opacity: 0.03;
  transform: rotate(34deg);
  z-index: -2;
  pointer-events: none;
}

/* ANIMATION */
@keyframes fernFloat {
  0%   { transform: translateY(0px) rotate(10deg); }
  50%  { transform: translateY(-14px) rotate(12deg); }
  100% { transform: translateY(0px) rotate(10deg); }
}

@keyframes fernFloatSlow {
  0%   { transform: translateY(0px) rotate(-10deg); }
  50%  { transform: translateY(-10px) rotate(-8deg); }
  100% { transform: translateY(0px) rotate(-10deg); }
}

h2 {
  font-family: 'Playfair Display';
  color: var(--green);
}

/* TEAM */
.member {
  display: flex;
  gap: 30px;
  margin-top: 40px;
}

.member img {
  width: 160px;
  border-radius: 8px;
}

/* CONTACT */
.contact-form {
  max-width: 520px;
  display: flex;
  flex-direction: column;
  gap: 18px;
}

.contact-form input,
.contact-form textarea {
  padding: 16px;
  font-size: 16px;
  border: 1px solid #ddd;
}

button {
  background: var(--green);
  color: white;
  padding: 16px;
  border-radius: 30px;
  border: none;
  cursor: pointer;
}

/* HOME CONTACT */
.home-contact-title {
  font-family: 'Playfair Display';
  font-size: 3em;
  color: var(--green);
  margin-top: 120px;
  margin-bottom: 30px;
}

/* SUCCESS */
.success {
  opacity: 0;
  transition: 0.5s;
}

.success.show {
  opacity: 1;
}

/* FOOTER */
.footer {
  position: fixed;
  bottom: 20px;
  right: 30px;
}

.footer a {
  margin-left: 15px;
  color: var(--green);
}

/* MOBILE */
@media(max-width:768px){
  .nav-left {
    flex-wrap: wrap;
    justify-content: center;
  }

  .hero {
    padding: 120px 20px;
  }

  .hero h1 {
    font-size: 3em;
  }

  .section {
    padding: 80px 20px;
  }

  .member {
    flex-direction: column;
  }

  .hero::before {
    width: 380px;
    height: 380px;
    right: -90px;
    top: 20px;
    opacity: 0.10;
  }

  .section::after {
    width: 260px;
    height: 260px;
    right: -80px;
    opacity: 0.06;
  }
}

</style>
