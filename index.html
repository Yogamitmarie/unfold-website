<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>UNFOLD e.V.</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<style>

/* 🌿 DESIGN SYSTEM */
:root {
  --bg: #f8f6f1;
  --white: #ffffff;
  --text: #2a2a2a;
  --soft: #d8d2c8;

  --green: #a3b18a;
  --apricot: #f2c6a0;

  --md: 32px;
  --xl: 120px;
}

/* 🌿 BASE */
body {
  margin: 0;
  font-family: 'Inter', sans-serif;
  background: var(--bg);
  color: var(--text);

  /* 🌿 FARNE */
  background-image: url("images/fern-bg.png");
  background-repeat: no-repeat;
  background-position: right bottom;
  background-size: 45%;
  opacity: 1;
}

/* 🌿 NAVBAR */
.navbar {
  position: fixed;
  top: 0;
  width: 100%;
  display: flex;
  justify-content: center;
  padding: 16px 24px;
  background: rgba(248,246,241,0.85);
  backdrop-filter: blur(10px);
  z-index: 100;
}

.nav-left {
  display: flex;
  gap: 32px;
  align-items: center;
}

.nav-right {
  position: absolute;
  right: 60px;
  display: flex;
  gap: 6px;
  background: rgba(255,255,255,0.6);
  padding: 4px 10px;
  border-radius: 20px;
}

/* LINKS */
.navbar a {
  text-decoration: none;
  color: var(--text);
  font-size: 14px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  cursor: pointer;
  transition: all 0.2s ease;
}

.navbar a:hover {
  color: var(--green);
  transform: translateY(-2px);
}

/* 🌿 DROPDOWN FIX */
.dropdown {
  position: relative;
  padding-bottom: 10px; /* Hover-Brücke */
}

.dropdown-content {
  display: none;
  position: absolute;
  top: 30px;
  background: white;
  border-radius: 8px;
  box-shadow: 0 15px 30px rgba(0,0,0,0.08);
  min-width: 180px;
  padding: 8px 0;
}

.dropdown-content a {
  display: block;
  padding: 10px 16px;
}

.dropdown:hover .dropdown-content {
  display: block;
}

/* 🌿 HERO */
.hero {
  height: 85vh;
  display: flex;
  align-items: flex-start;
  padding: var(--xl) var(--md);
}

.hero h1 {
  font-size: 5em;
  font-family: 'Playfair Display', serif;
  margin: 0;
}

.hero .ev {
  font-size: 32px;
  letter-spacing: 0.25em;
  color: var(--green);
}

.hero p {
  margin-top: 16px;
  color: #555;
}

/* 🌿 SECTION */
.section {
  padding: var(--xl) var(--md);
  max-width: 800px;
  line-height: 1.7;
}

.section h2 {
  color: var(--green);
}

/* 🌿 TEAM */
.team {
  display: flex;
  flex-direction: column;
  gap: 60px;
}

.member {
  display: flex;
  gap: 30px;
}

.member img {
  width: 140px;
  height: 180px;
  object-fit: cover;
  border-radius: 6px;
}

/* 🌿 FOOTER */
.footer {
  padding: 60px 32px;
  display: flex;
  justify-content: space-between;
  border-top: 1px solid #eee;
}

.footer a {
  color: var(--green);
  margin-left: 12px;
}

/* 🌿 PAGES */
.page {
  opacity: 0;
  transform: translateY(30px);
  pointer-events: none;
  position: absolute;
  width: 100%;
  padding-top: 100px;
  transition: all 0.8s ease;
}

.page.active {
  opacity: 1;
  transform: translateY(0);
  pointer-events: auto;
  position: relative;
}

/* 🌿 MOBILE */
@media (max-width: 768px) {
  .hero h1 {
    font-size: 2.5em;
  }

  .nav-right {
    right: 20px;
  }

  .member {
    flex-direction: column;
  }
}

</style>
</head>

<body>

<div class="navbar">
  <div class="nav-left">

    <a onclick="showPage('home')">Home</a>

    <div class="dropdown">
      <a>About</a>
      <div class="dropdown-content">
        <a onclick="showPage('vision')">Vision</a>
        <a onclick="showPage('team')">Team</a>
        <a onclick="showPage('methodology')">Methodology</a>
      </div>
    </div>

    <a onclick="showPage('contact')">Contact</a>

  </div>

  <div class="nav-right">
    <a href="#">ENG</a>
    <a href="#">DE</a>
  </div>
</div>

<!-- HOME -->
<section id="home" class="page active">
  <section class="hero">
    <div>
      <h1>UNFOLD</h1>
      <div class="ev">e.V.</div>
      <p>Embodied Learning Across Europe</p>
    </div>
  </section>
</section>

<!-- VISION -->
<section id="vision" class="page">
  <div class="section">
    <h2>Our Vision</h2>
    <p>UNFOLD e.V. is a youth-led, non-profit organization...</p>
  </div>
</section>

<!-- TEAM -->
<section id="team" class="page">
  <div class="section">
    <h2>Our Team</h2>

    <div class="team">
      <div class="member">
        <img src="images/Profilbild_Marie.jpg">
        <div>
          <h3>Marie Wächter</h3>
        </div>
      </div>
    </div>

  </div>
</section>

<!-- CONTACT -->
<section id="contact" class="page">
  <div class="section">
    <h2>Contact</h2>
    <p>Email: unfold.erasmus@gmail.com</p>
  </div>
</section>

<div class="footer">
  <div>UNFOLD e.V.</div>
  <div>
    <a href="#">Instagram</a>
    <a href="#">Email</a>
  </div>
</div>

<script>
function showPage(id) {
  document.querySelectorAll('.page').forEach(p => {
    p.classList.remove('active');
  });

  document.getElementById(id).classList.add('active');
  window.scrollTo({ top: 0, behavior: 'smooth' });
}
</script>

</body>
</html>
