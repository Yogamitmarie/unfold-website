<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>UNFOLD e.V.</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<style>

/* 🌿 DESIGN SYSTEM */
:root {
  --bg: #f8f6f1;
  --white: #ffffff;
  --text: #2a2a2a;
  --soft: #d8d2c8;
  --green: #7a8f6a;
}

/* 🌿 BASE */
body {
  margin: 0;
  font-family: 'Inter', sans-serif;
  background: var(--bg);
  color: var(--text);

  background-image: url("images/fern-bg.png");
  background-repeat: no-repeat;
  background-position: right center;
  background-size: 65%;
}

/* 🌿 NAVBAR */
.navbar {
  position: fixed;
  top: 0;
  width: 100%;
  display: flex;
  justify-content: center;
  padding: 16px 24px;
  background: rgba(248,246,241,0.9);
  backdrop-filter: blur(10px);
  z-index: 100;
}

.nav-left {
  display: flex;
  gap: 32px;
  align-items: center;
}

.nav-right {
  position: absolute;
  right: 50px;
  display: flex;
  gap: 6px;
  background: rgba(255,255,255,0.6);
  padding: 4px 10px;
  border-radius: 20px;
}

.navbar a {
  text-decoration: none;
  color: var(--text);
  font-size: 14px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  cursor: pointer;
}

.navbar a:hover {
  color: var(--green);
}

/* 🌿 DROPDOWN */
.dropdown {
  position: relative;
  padding-bottom: 8px;
}

.dropdown-content {
  display: none;
  position: absolute;
  top: 28px;
  background: white;
  border-radius: 8px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.08);
  min-width: 180px;
}

.dropdown-content a {
  display: block;
  padding: 10px 16px;
}

.dropdown:hover .dropdown-content {
  display: block;
}

/* 🌿 PAGE */
.page {
  opacity: 0;
  transform: translateY(30px);
  pointer-events: none;
  position: absolute;
  width: 100%;
  padding-top: 100px;
  transition: all 0.8s ease;
}

.page.active {
  opacity: 1;
  transform: translateY(0);
  pointer-events: auto;
  position: relative;
}

/* 🌿 HERO */
.hero {
  height: 85vh;
  display: flex;
  align-items: flex-start;
  padding: 120px 32px;
}

.hero h1 {
  font-size: 5em;
  font-family: 'Playfair Display', serif;
  margin: 0;
}

.hero .ev {
  font-family: 'Playfair Display', serif;
  font-size: 34px;
  color: var(--green);
  letter-spacing: 0.05em;
}

.hero p {
  margin-top: 16px;
}

/* 🌿 SECTION */
.section {
  padding: 120px 32px;
  max-width: 800px;
  line-height: 1.7;
}

.section h2 {
  color: var(--green);
}

/* 🌿 TEAM */
.team {
  display: flex;
  flex-direction: column;
  gap: 60px;
}

.member {
  display: flex;
  gap: 30px;
}

.member img {
  width: 140px;
  height: 180px;
  object-fit: cover;
  border-radius: 6px;
}

/* 🌿 CONTACT FORM */
.contact-form {
  display: flex;
  flex-direction: column;
  gap: 14px;
  max-width: 420px;
}

.contact-form input,
.contact-form textarea {
  padding: 10px;
  border: 1px solid #ddd;
  font-family: 'Inter';
}

/* BUTTON */
.contact-form button {
  background: var(--green);
  color: white;
  border: none;
  padding: 12px;
  border-radius: 25px;
  cursor: pointer;
  transition: all 0.2s ease;
}

.contact-form button:hover {
  transform: translateY(-2px);
  opacity: 0.9;
}

/* SUCCESS MESSAGE */
.success-message {
  display: none;
  margin-top: 20px;
  color: var(--green);
}

/* 🌿 FOOTER */
.footer {
  padding: 60px 32px;
  display: flex;
  justify-content: space-between;
  border-top: 1px solid #eee;
}

.footer a {
  color: var(--green);
  margin-left: 12px;
}

</style>
</head>

<body>

<!-- NAV -->
<div class="navbar">

  <div class="nav-left">
    <a onclick="showPage('home')">Home</a>

    <div class="dropdown">
      <a>About</a>
      <div class="dropdown-content">
        <a onclick="showPage('vision')">Vision</a>
        <a onclick="showPage('team')">Team</a>
        <a onclick="showPage('methodology')">Methodology</a>
      </div>
    </div>

    <div class="dropdown">
      <a>Programs</a>
      <div class="dropdown-content">
        <a>Local Programs</a>
        <a>International Programs</a>
      </div>
    </div>

    <a onclick="showPage('contact')">Contact</a>
  </div>

  <div class="nav-right">
    <a href="#">ENG</a>
    <a href="#">DE</a>
  </div>

</div>

<!-- HOME -->
<section id="home" class="page active">
  <section class="hero">
    <div>
      <h1>UNFOLD <span class="ev">e.V.</span></h1>
      <p>Embodied Learning Across Europe.</p>
    </div>
  </section>
</section>

<!-- CONTACT -->
<section id="contact" class="page">
  <div class="section">

    <h2>Contact</h2>

    <form class="contact-form" id="contact-form">

      <label>Name
        <input type="text" name="name" required>
      </label>

      <label>Email
        <input type="email" name="email" required>
      </label>

      <label>Message
        <textarea name="message" rows="5" required></textarea>
      </label>

      <button type="submit">Send Message</button>

    </form>

    <div class="success-message" id="success-message">
      Thank you for your message. We will get back to you.
    </div>

  </div>
</section>

<div class="footer">
  <div>UNFOLD e.V.</div>
  <div>
    <a href="https://instagram.com/unfold.ev">Instagram</a>
    <a href="mailto:unfold.erasmus@gmail.com">Email</a>
  </div>
</div>

<script>

/* PAGE SWITCH */
function showPage(id) {
  document.querySelectorAll('.page').forEach(p => {
    p.classList.remove('active');
  });

  document.getElementById(id).classList.add('active');
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

/* FORM SUBMIT (AJAX) */
const form = document.getElementById("contact-form");
const success = document.getElementById("success-message");

form.addEventListener("submit", function(e) {
  e.preventDefault();

  fetch("https://formspree.io/f/mzdydevo", {
    method: "POST",
    body: new FormData(form),
    headers: { 'Accept': 'application/json' }
  })
  .then(response => {
    if (response.ok) {
      form.reset();
      success.style.display = "block";
    }
  });
});

</script>

</body>
</html>
