<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>UNFOLD e.V.</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<style>

/* 🌿 DESIGN SYSTEM */
:root {
  --bg: #f3f2ec;
  --white: #ffffff;
  --text: #2a2a2a;
  --soft: #c8c2b8;

  --sm: 16px;
  --md: 32px;
  --lg: 64px;
  --xl: 120px;
}

/* 🌿 BASE */
body {
  margin: 0;
  font-family: 'Inter', sans-serif;
  background: var(--bg);
  color: var(--text);
}

/* 🌿 NAVBAR */
.navbar {
  position: fixed;
  top: 0;
  width: 100%;
  display: flex;
  justify-content: space-between;
  padding: 14px 24px;
  background: rgba(243,242,236,0.9);
  backdrop-filter: blur(12px);
  z-index: 100;
}

.nav-left {
  display: flex;
  gap: 18px;
}

.nav-right {
  display: flex;
  gap: 10px;
}

.navbar a {
  text-decoration: none;
  color: var(--text);
  font-size: 12px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  cursor: pointer;
}

.navbar a:hover {
  color: var(--soft);
}

/* 🌿 DROPDOWN */
.dropdown {
  position: relative;
}

.dropdown-content {
  display: none;
  position: absolute;
  top: 22px;
  background: white;
}

.dropdown-content a {
  display: block;
  padding: 10px;
}

.dropdown:hover .dropdown-content {
  display: block;
}

/* 🌿 PAGE */
.page {
  opacity: 0;
  transform: translateY(30px);
  pointer-events: none;
  position: absolute;
  width: 100%;
  padding-top: 100px;
  transition: all 1s ease;
}

.page.active {
  opacity: 1;
  transform: translateY(0);
  pointer-events: auto;
  position: relative;
}

/* 🌿 HERO */
.hero {
  height: 90vh;
  display: flex;
  align-items: center;
  padding: var(--xl) var(--md);
  position: relative;
}

.hero h1 {
  font-size: 4em;
  margin: 0;
}

.hero small {
  font-size: 14px;
  letter-spacing: 0.1em;
  color: var(--soft);
}

/* 🌿 FERN OVERLAY */
.fern {
  position: absolute;
  right: 5%;
  top: 20%;
  width: 180px;
  opacity: 0.15;
}

/* 🌿 TEXT */
.section {
  padding: var(--xl) var(--md);
  max-width: 700px;
}

.white {
  background: var(--white);
}

/* 🌿 IMAGE */
.image-block {
  height: 60vh;
  background-size: cover;
  background-position: center;
}

/* 🌿 TEAM */
.team {
  display: flex;
  flex-direction: column;
  gap: var(--lg);
}

.member {
  display: flex;
  gap: var(--md);
}

.member img {
  width: 140px;
  height: 180px;
  object-fit: cover;
}

/* 🌿 CONTACT */
.contact-form {
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.contact-form input,
.contact-form textarea {
  padding: 12px;
  border: 1px solid #ddd;
}

/* 🌿 FOOTER */
.footer {
  padding: var(--lg) var(--md);
  display: flex;
  justify-content: space-between;
  border-top: 1px solid #ddd;
}

/* 🌿 MOBILE OPTIMIZATION */
@media (max-width: 768px) {

  .nav-left {
    gap: 12px;
    flex-wrap: wrap;
  }

  .hero {
    padding: 120px 20px 40px;
  }

  .hero h1 {
    font-size: 2.5em;
  }

  .fern {
    width: 120px;
    top: 10%;
  }

  .section {
    padding: 60px 20px;
  }

  .member {
    flex-direction: column;
  }

  .image-block {
    height: 40vh;
  }

}

</style>
</head>

<body>

<!-- 🌿 NAV -->
<div class="navbar">

  <div class="nav-left">
    <a onclick="showPage('home')">Home</a>

    <div class="dropdown">
      <a>About</a>
      <div class="dropdown-content">
        <a onclick="showPage('vision')">Vision</a>
        <a onclick="showPage('team')">Team</a>
        <a onclick="showPage('methodology')">Methodology</a>
      </div>
    </div>

    <div class="dropdown">
      <a>Programs</a>
      <div class="dropdown-content">
        <a>Local Programs</a>
        <a>International Programs</a>
      </div>
    </div>

    <a onclick="showPage('contact')">Contact</a>
  </div>

  <div class="nav-right">
    <a>ENG</a>
    <a>DE</a>
  </div>

</div>

<!-- 🌿 HOME -->
<section id="home" class="page active">

  <section class="hero">

    <img src="images/fern.png" class="fern">

    <div>
      <h1>UNFOLD</h1>
      <small>e.V.</small>
      <p>Embodied Learning Across Europe</p>
    </div>

  </section>

</section>

<!-- 🌿 VISION -->
<section id="vision" class="page">
  <div class="section">
    <h2>Our Vision</h2>
    <p>Transformation begins in the body.</p>
  </div>
</section>

<!-- 🌿 TEAM -->
<section id="team" class="page">
  <div class="section white">

    <h2>Our Team</h2>

    <div class="team">

      <div class="member">
        <img src="images/Profilbild_Marie.jpg">
        <div>
          <h3>Marie Wächter</h3>
        </div>
      </div>

      <div class="member">
        <img src="images/Profilbild_Marenka.jpg">
        <div>
          <h3>Marenka Sedlaczcek</h3>
        </div>
      </div>

    </div>

  </div>
</section>

<!-- 🌿 CONTACT -->
<section id="contact" class="page">
  <div class="section">
    <h2>Contact</h2>

    <form class="contact-form">
      <input placeholder="Name">
      <input placeholder="Email">
      <textarea placeholder="Message"></textarea>
      <button>Send</button>
    </form>

  </div>
</section>

<!-- 🌿 FOOTER -->
<div class="footer">
  <div>UNFOLD e.V.</div>
  <div>
    <a href="https://instagram.com/unfold.ev">Instagram</a>
    <a href="mailto:unfold.erasmus@gmail.com">Email</a>
  </div>
</div>

<script>

function showPage(id) {
  document.querySelectorAll('.page').forEach(p => {
    p.classList.remove('active');
  });

  document.getElementById(id).classList.add('active');
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

</script>

</body>
</html>
